services:

  # ==========================================
  # MINIO
  # ==========================================

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 minio minio12345;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      exit 0;
      "

  # ==========================================
  # POSTGRESQL (GOLD LAYER)
  # ==========================================

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app12345
      POSTGRES_DB: socialtrends
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/gold_tables.sql:/docker-entrypoint-initdb.d/02_gold.sql
      - ./sql/analytics_tables.sql:/docker-entrypoint-initdb.d/03_analytics.sql

  # ==========================================
  # AIRFLOW
  # ==========================================

  airflow:
    image: apache/airflow:2.10.4

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://app:app12345@postgres/socialtrends

      PYTHONPATH: /opt/airflow

      POSTGRES_HOST: postgres
      POSTGRES_DB: socialtrends
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app12345

      MONGO_URI: mongodb://app:app12345@mongo:27017

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092      

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      _PIP_ADDITIONAL_REQUIREMENTS: >
        kafka-python
        pymongo
        boto3
        pandas
        langdetect
        textblob
        duckdb
        psycopg2-binary

    ports:
      - "8080:8080"

    volumes:
      - ./:/opt/airflow

    command: standalone

  # ==========================================
  # KAFKA (KRaft)
  # ==========================================

  kafka:
    image: apache/kafka:latest
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

    volumes:
      - kafka_data:/opt/kafka/data
  # ==========================================
  # MONGODB
  # ==========================================

  mongo:
    image: mongo:7

    environment:
      MONGO_INITDB_ROOT_USERNAME: app
      MONGO_INITDB_ROOT_PASSWORD: app12345

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  # ==========================================
  # OLLAMA
  # ==========================================

  ollama:
    image: ollama/ollama:latest

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

  # ==========================================
  # SUPERSET
  # ==========================================

  superset:
    image: apache/superset:latest

    environment:
      SUPERSET_SECRET_KEY: socialtrends_secret

    ports:
      - "8088:8088"

    volumes:
      - superset_home:/app/superset_home

    depends_on:
      - postgres

volumes:
  minio_data:
  postgres_data:
  mongo_data:
  ollama_data:
  superset_home:
  kafka_data: